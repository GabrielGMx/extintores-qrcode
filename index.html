<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Leitor QRCode - Extintores</title>
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      background-color: #b22222;
      color: white;
    }
    h1 {
      font-size: 36px;
      margin-top: 20px; 
    }
    #reader {
      margin: auto;
      width: 100%;
      max-width: 500px;
    }
    #result {
      margin-top: 20px;
      font-size: 24px;
      font-weight: bold;
    }
    #qrcodeValue, #tipo, #status, #brigadista, #obs {
      display: block;
      margin: 12px auto;
      border-radius: 6px;
      border: none;
    }
    #qrcodeValue {
      font-size: 24px;
      padding: 8px;
      text-align: center;
    }
    #tipo, #status {
      font-size: 26px;
      padding: 12px;
      text-align: center;
    }
    #brigadista {
      font-size: 30px;
      padding: 12px;
      width: 50%;
    }
    #obs {
      font-size: 26px;
      padding: 16px;
      width: 70%;
      height: 120px;
    }
    label {
      font-size: 30px;
      margin-right: 8px;
      color: white;
    }
    button {
      font-size: 32px;
      padding: 22px 32px;
      margin: 40px auto 16px auto;
      border-radius: 12px;
      background-color: #007bff;
      color: white;
      border: none;
      cursor: pointer;
      display: block;
    }
    button:hover { background-color: #0056b3; }
    #toggleCamera {
      background-color: #9c9c9c;
      color: black;
      font-size: 20px;
      padding: 10px 16px;
      border-radius: 50px;
      margin-top: 10px;
    }
  </style>
</head>

  <body>
  <h1>QRCode - Extintores</h1>
  <button id="toggleCamera">📷 Trocar câmera</button>
  <div id="reader"></div>
  <p id="result"></p>

  <div id="form" style="margin-top:20px; display:none;">
    <input type="text" id="qrcodeValue" readonly><br>
    <p id="localInfo"></p>

    <label for="tipo">Tipo de Extintor:</label>
    <select id="tipo">
      <option value="" disabled selected>Selecionar...</option>
      <option value="CO2 6Kg">CO2 6Kg</option>
      <option value="CO2 10Kg">CO2 10Kg</option>
      <option value="CO2 20Kg">CO2 20Kg</option>
      <option value="Espuma 10L">Espuma 10L</option>
      <option value="Espuma 50L">Espuma 50L</option>
      <option value="Pó ABC 6Kg">Pó ABC 6Kg</option>
    </select><br>

    <label for="status">Status:</label>
    <select id="status">
      <option value="" disabled selected>Selecionar...</option>
      <option value="OK">OK</option>
      <option value="Despressurizado">Despressurizado</option>
      <option value="Vencido">Vencido</option>
      <option value="Faltando">Faltando</option>
    </select><br>

    <label for="obs">Observação:</label>
    <textarea id="obs" placeholder="Insira a observação..."></textarea><br>

    <label for="brigadista">Brigadista Vistoriador:</label>
    <input type="text" id="brigadista" placeholder="Posto/Grad Nome de Guerra">

    <button onclick="enviar()">Enviar</button>
  </div>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzxVK9-FTtbZFdb1GzJAARI1sivxAu41xKcLjUdnurR0p0rXfxyZviqOGt3k4DR7uauXg/exec";

    function onScanSuccess(decodedText) {
      document.getElementById("result").innerText = "QR Lido: " + decodedText;
      document.getElementById("form").style.display = "block";
      document.getElementById("qrcodeValue").value = decodedText;

      // Consulta do local (GET simples)
      fetch(`${SCRIPT_URL}?qr=${encodeURIComponent(decodedText)}`)
        .then(r => r.json())
        .then(resp => {
          if (resp.local) {
            document.getElementById("localInfo").innerText = "Edificação: " + resp.local;
          } else {
            document.getElementById("localInfo").innerText = "Local não encontrado";
          }
        })
        .catch(err => console.error("Erro ao buscar LOCAL:", err));
    }

    const html5QrCode = new Html5Qrcode("reader");
    let cameras = { front: [], back: [] }, currentType = "back";

    Html5Qrcode.getCameras().then(devices => {
      devices.forEach(d => {
        const label = d.label.toLowerCase();
        if (label.includes("front")) cameras.front.push(d.id);
        else cameras.back.push(d.id);
      });
      let startId = cameras.back.length ? cameras.back[0] : devices[0].id;
      html5QrCode.start(startId, { fps: 10, qrbox: 350 }, onScanSuccess);

      document.getElementById("toggleCamera").addEventListener("click", () => {
        html5QrCode.stop().then(() => {
          currentType = currentType === "back" ? "front" : "back";
          let nextId = cameras[currentType][0] || devices[0].id;
          html5QrCode.start(nextId, { fps: 10, qrbox: 350 }, onScanSuccess);
        });
      });
    }).catch(err => console.error("Erro ao acessar câmera:", err));

    function enviar() {
      const qr = document.getElementById("qrcodeValue").value;
      const tipo = document.getElementById("tipo").value;
      const status = document.getElementById("status").value;
      const obs = document.getElementById("obs").value;
      const brigadista = document.getElementById("brigadista").value;
      const dataHora = new Date().toLocaleString();

      if (!tipo || !status || !brigadista) {
        alert("⚠️ Preencha Tipo, Status e Brigadista antes de enviar!");
        return;
      }

      const formData = new URLSearchParams({ qr, tipo, status, brigadista, obs, dataHora });

      fetch(SCRIPT_URL, { method: "POST", body: formData })
        .then(r => r.json())
        .then(resp => {
          console.log("Resposta:", resp);
          if (resp.resultado && resp.resultado.toLowerCase() === "sucesso") {
            alert("✅ Vistoria realizada com sucesso!");
            document.getElementById("form").style.display = "none";
          } else if (resp.resultado === "QR não encontrado") {
            alert("⚠️ QR não encontrado na planilha.");
          } else if (resp.resultado === "Parâmetros inválidos") {
            alert("❌ Parâmetros inválidos. Verifique a chamada.");
          } else {
            alert("⚠️ Erro: resposta inesperada no servidor.");
          }
        })
        .catch(err => alert("❌ Erro ao enviar: " + err));
    }
  </script>
</body>
</html>
